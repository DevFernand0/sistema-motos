<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUA LOJA AQUI - Gestão</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --accent: #ef4444; 
            --text-main: #ffffff; --text-dim: #a0a0a0; --green: #22c55e;
            --input-bg: #1f1f1f; --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; }

        .sidebar { width: 240px; height: 100vh; background: #111; padding: 30px 20px; border-right: 1px solid #222; position: fixed; z-index: 100; display: flex; flex-direction: column; }
        .logo { font-size: 1.1rem; font-weight: 600; color: var(--accent); margin-bottom: 40px; text-align: center; border: 1px solid var(--accent); padding: 12px; border-radius: 8px; text-transform: uppercase; }
        .nav-item { padding: 12px 15px; color: var(--text-dim); cursor: pointer; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; transition: var(--transition); position: relative; }
        .nav-item i { margin-right: 12px; width: 18px; }
        .nav-item:hover { background: rgba(239, 68, 68, 0.1); color: white; }
        .nav-item.active { background: var(--accent); color: white; }
        #count-orc { position: absolute; right: 12px; background: var(--accent); font-size: 0.65rem; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid #111; }

        .main { margin-left: 240px; padding: 40px; width: 100%; max-width: 1400px; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .moto-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #222; transition: var(--transition); display: flex; flex-direction: column; position: relative; }
        .moto-card:hover { transform: translateY(-5px); border-color: #444; }

        .carousel-container { position: relative; width: 100%; height: 160px; overflow: hidden; background: #1a1a1a; }
        .carousel-track { display: flex; transition: transform 0.5s ease-in-out; height: 100%; width: 100%; }
        .carousel-track img { min-width: 100%; height: 100%; object-fit: cover; }
        .carousel-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; z-index: 5; }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: 0.3s; }
        .dot.active { background: var(--accent); width: 10px; border-radius: 3px; }

        .moto-card-body { padding: 15px; flex-grow: 1; }
        .moto-brand { font-size: 0.65rem; color: #6366f1; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .moto-name { font-size: 0.95rem; font-weight: 600; margin-bottom: 10px; }
        .moto-price-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #222; padding-top: 12px; }
        .moto-price { color: var(--green); font-weight: 700; font-size: 1.1rem; }
        .btn-add-cart { background: rgba(255,255,255,0.05); border: none; color: white; width: 35px; height: 35px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-add-cart:hover { background: var(--accent); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card-stat { background: var(--card); padding: 25px; border-radius: 15px; border-left: 4px solid var(--accent); position: relative; }
        .card-stat i { position: absolute; right: 20px; top: 20px; color: var(--accent); opacity: 0.2; }

        .sidebar-orcamento { position: fixed; right: 0; top: 0; width: 360px; height: 100vh; background: #111; border-left: 1px solid #222; padding: 25px; display: flex; flex-direction: column; transform: translateX(100%); transition: var(--transition); z-index: 200; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .sidebar-orcamento.open { transform: translateX(0); }
        .btn-whatsapp { background: var(--green); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }

        @media (max-width: 850px) {
            .sidebar { width: 100%; height: 70px; flex-direction: row; bottom: 0; top: auto; padding: 0; border-top: 1px solid #222; }
            .sidebar .logo { display: none; }
            .main { margin-left: 0; padding: 20px; padding-bottom: 100px; }
            .sidebar-orcamento { width: 100%; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">SUA LOJA AQUI</div>
        <div class="nav-item active" onclick="showSection('dashboard', this)"><i data-lucide="layout-dashboard"></i><span>Início</span></div>
        <div class="nav-item" onclick="showSection('estoque', this)"><i data-lucide="package"></i><span>Estoque</span></div>
        <div class="nav-item" onclick="showSection('vendas', this)"><i data-lucide="shopping-cart"></i><span>Vendas</span></div>
        <div class="nav-item" onclick="toggleOrcamento()">
            <i data-lucide="file-text"></i><span>Pedido</span>
            <span id="count-orc">0</span>
        </div>
    </nav>

    <div id="sidebar-orcamento" class="sidebar-orcamento">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Seu Pedido</h2>
            <button onclick="toggleOrcamento()" style="background:none; border:none; color:white; cursor:pointer;"><i data-lucide="x"></i></button>
        </div>
        <div id="lista-itens-orcamento" style="flex:1; overflow-y:auto;"></div>
        <div style="background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #222; margin-top: 10px;">
            <div style="display:flex; justify-content:space-between; font-weight:600; color:var(--green); font-size:1.1rem;"><span>TOTAL</span><span id="total-orc">R$ 0,00</span></div>
        </div>
        <button class="btn-whatsapp" onclick="enviarWhatsApp()"><i data-lucide="message-circle"></i> ENVIAR WHATSAPP</button>
    </div>

    <div class="main">
        <div id="dashboard" class="section active">
            <h1>Dashboard</h1>
            <div class="stats-grid">
                <div class="card-stat">
                    <i data-lucide="database"></i><span>VALOR DISPONÍVEL EM ESTOQUE</span>
                    <h2 id="card-estoque">R$ 0,00</h2>
                    <p id="qtd-estoque" style="font-size: 0.8rem; color: var(--text-dim);">Carregando...</p>
                </div>
                <div class="card-stat" style="border-color: var(--green)">
                    <i data-lucide="trending-up" style="color: var(--green)"></i><span>FATURAMENTO TOTAL</span>
                    <h2 id="card-vendas">R$ 0,00</h2>
                    <p id="qtd-vendas" style="font-size: 0.8rem; color: var(--text-dim);">0 vendas</p>
                </div>
            </div>
            <div style="background: var(--card); padding: 25px; border-radius: 15px; height: 350px; border: 1px solid #222;">
                <canvas id="graficoFluxo"></canvas>
            </div>
        </div>

        <div id="estoque" class="section">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h1>Estoque de Peças e Motos</h1>
                <input type="text" id="inputBusca" style="width:250px; padding:10px; border-radius:8px; border:1px solid #333; background:#1a1a1a; color:white;" placeholder="Buscar..." onkeyup="filtrarEstoque()">
            </div>
            <div id="lista-estoque" class="cards-grid"></div>
        </div>

        <div id="vendas" class="section">
            <h1>Histórico de Vendas</h1>
            <div style="background: var(--card); border-radius: 15px; padding: 20px; margin-top: 20px; border: 1px solid #222; overflow-x: auto;">
                <table style="width:100%; border-collapse: collapse;">
                    <thead><tr style="text-align:left; color:var(--text-dim); font-size:0.8rem;"><th style="padding:10px;">DATA</th><th>PRODUTO</th><th>VALOR</th></tr></thead>
                    <tbody id="lista-vendas"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const LINKS = {
            estoque: "https://docs.google.com/spreadsheets/d/e/2PACX-1vR50CSZGC-H-iB6k9qcCQ7_u7aucJEljPMqIv7bfqXRqOvg8q_h-sBh4wd1s2HM-fjn8itH7YZe-Pmb/pub?output=csv",
            vendas: "https://docs.google.com/spreadsheets/d/e/2PACX-1vR50CSZGC-H-iB6k9qcCQ7_u7aucJEljPMqIv7bfqXRqOvg8q_h-sBh4wd1s2HM-fjn8itH7YZe-Pmb/pub?gid=730369017&single=true&output=csv"
        };

        let carrinho = [];
        let meuGrafico = null;
        const formatter = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

        function showSection(id, element) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            element.classList.add('active');
            lucide.createIcons();
        }

        function toggleOrcamento() { document.getElementById('sidebar-orcamento').classList.toggle('open'); }

        async function fetchData() {
            try {
                const [resE, resV] = await Promise.all([fetch(LINKS.estoque), fetch(LINKS.vendas)]);
                processEstoque(await resE.text());
                processVendas(await resV.text());
            } catch (e) { console.error(e); }
        }

        // Função para separar CSV ignorando vírgulas dentro de aspas ou links complexos
        function parseCSVLine(line) {
            const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
            return line.split(regex);
        }

        function processEstoque(csv) {
            const linhas = csv.split('\n').slice(1).filter(l => l.trim());
            const container = document.getElementById('lista-estoque');
            let html = "", totalValDisp = 0;

            linhas.forEach((l, cardIdx) => {
                const c = parseCSVLine(l); // Usa a nova função de separação
                const valor = parseFloat(c[3]?.replace(/[^\d,]/g, '').replace(',', '.')) || 0;
                const isVendido = c[8] && c[8].trim().toLowerCase() === "vendido";
                if (!isVendido) totalValDisp += valor;

                // CORREÇÃO: Pega a coluna H e separa os links apenas se houver vírgula nela
                let fotosRaw = c[7] ? c[7].replace(/"/g, '').trim() : "";
                const fotos = fotosRaw.includes(',') ? fotosRaw.split(',') : [fotosRaw];
                
                const linksValidos = fotos.filter(f => f.startsWith('http'));

                if (linksValidos.length === 0) linksValidos.push('https://via.placeholder.com/300x160/1a1a1a/ef4444?text=' + c[2]);

                const imagensHtml = linksValidos.map(url => `<img src="${url.trim()}" onerror="this.src='https://via.placeholder.com/300x160/1a1a1a/333?text=Erro+na+Imagem'">`).join('');
                const dotsHtml = linksValidos.length > 1 ? `<div class="carousel-dots">${linksValidos.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" id="dot-${cardIdx}-${i}"></div>`).join('')}</div>` : '';

                const estiloCard = isVendido ? 'style="opacity: 0.6; filter: grayscale(1); pointer-events: none;"' : '';
                const seloVendido = isVendido ? '<div style="position: absolute; top: 10px; right: 10px; background: #000; color: #fff; padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 0.7rem; z-index: 10; border: 1px solid #fff;">VENDIDO</div>' : '';
                
                const botaoAcao = isVendido ? 
                    `<button class="btn-add-cart" style="background: #333; cursor: not-allowed;"><i data-lucide="slash"></i></button>` : 
                    `<button class="btn-add-cart" onclick="addCarrinho('${c[2]}', ${valor})"><i data-lucide="plus"></i></button>`;

                html += `
                <div class="moto-card" ${estiloCard}>
                    ${seloVendido}
                    <div class="carousel-container">
                        <div class="carousel-track" id="track-${cardIdx}">${imagensHtml}</div>
                        ${dotsHtml}
                    </div>
                    <div class="moto-card-body">
                        <span class="moto-brand">${c[6] || 'MARCA'}</span>
                        <div class="moto-name">${c[2]}</div>
                        <div style="font-size:0.7rem; color:var(--text-dim); margin-bottom:10px;">Ano: ${c[5] || '--'} | Moto: ${c[4] || '--'}</div>
                        <div class="moto-price-row">
                            <span class="moto-price">${isVendido ? '---' : formatter.format(valor)}</span>
                            ${botaoAcao}
                        </div>
                    </div>
                </div>`;
            });

            container.innerHTML = html;
            document.getElementById('card-estoque').innerText = formatter.format(totalValDisp);
            document.getElementById('qtd-estoque').innerText = `${linhas.length} itens cadastrados`;
            lucide.createIcons();
            
            linhas.forEach((_, i) => iniciarCarrossel(i));
        }

        function iniciarCarrossel(idx) {
            const track = document.getElementById(`track-${idx}`);
            if (!track) return;
            const imgs = track.querySelectorAll('img');
            if (imgs.length <= 1) return;

            let current = 0;
            setInterval(() => {
                current = (current + 1) % imgs.length;
                track.style.transform = `translateX(-${current * 100}%)`;
                
                const dots = track.parentElement.querySelectorAll('.dot');
                dots.forEach((d, i) => d.classList.toggle('active', i === current));
            }, 3500 + (Math.random() * 500));
        }

        function processVendas(csv) {
            const linhas = csv.split('\n').slice(1).filter(l => l.trim());
            let html = "", fatM = 0, dadosG = [];
            linhas.forEach(l => {
                const c = parseCSVLine(l);
                const v = parseFloat(c[3]?.replace(/[^\d,]/g, '').replace(',', '.')) || 0;
                fatM += v;
                html += `<tr style="border-bottom:1px solid #222;"><td style="padding:12px;">${c[1]}</td><td>${c[2]}</td><td style="color:var(--green)">${formatter.format(v)}</td></tr>`;
                dadosG.push({ d: c[1]?.split(' ')[0], v: v });
            });
            document.getElementById('lista-vendas').innerHTML = html;
            document.getElementById('card-vendas').innerText = formatter.format(fatM);
            document.getElementById('qtd-vendas').innerText = `${linhas.length} vendas realizadas`;
            renderizarGrafico(dadosG.slice(-10));
        }

        function renderizarGrafico(dados) {
            const ctx = document.getElementById('graficoFluxo').getContext('2d');
            if (meuGrafico) meuGrafico.destroy();
            meuGrafico = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dados.map(x => x.d),
                    datasets: [{
                        data: dados.map(x => x.v),
                        borderColor: '#ef4444',
                        backgroundColor: 'rgba(239,68,68,0.1)',
                        fill: true, tension: 0.4, borderWidth: 3, pointRadius: 4
                    }]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { grid: { color: '#222' }, ticks: { color: '#666' } },
                        x: { grid: { display: false }, ticks: { color: '#666' } }
                    }
                }
            });
        }

        function addCarrinho(nome, preco) {
            carrinho.push({nome, preco});
            updateOrcamento();
            if(!document.getElementById('sidebar-orcamento').classList.contains('open')) toggleOrcamento();
        }

        function updateOrcamento() {
            document.getElementById('count-orc').innerText = carrinho.length;
            const total = carrinho.reduce((a, b) => a + b.preco, 0);
            document.getElementById('total-orc').innerText = formatter.format(total);
            document.getElementById('lista-itens-orcamento').innerHTML = carrinho.map((i, index) => `
                <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #222; font-size:0.85rem;">
                    <span>${i.nome}</span>
                    <b>${formatter.format(i.preco)}</b>
                </div>
            `).join('');
        }

        function filtrarEstoque() {
            const val = document.getElementById("inputBusca").value.toLowerCase();
            document.querySelectorAll(".moto-card").forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(val) ? "flex" : "none";
            });
        }

        function enviarWhatsApp() {
            if (carrinho.length === 0) return alert("Carrinho vazio!");
            let msg = "Olá! Gostaria de orçar os seguintes itens:%0A%0A";
            carrinho.forEach(i => msg += `• *${i.nome}* - ${formatter.format(i.preco)}%0A`);
            msg += `%0A*Total: ${document.getElementById('total-orc').innerText}*`;
            window.open(`https://wa.me/5581999999999?text=${msg}`, '_blank');
        }

        fetchData();
        lucide.createIcons();
    </script>
</body>
</html>
